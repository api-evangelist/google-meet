name: Google Meet
description: The Google Meet API provides programmatic access to Google Meet video
  conferencing functionality. It enables applications to create and manage meeting
  spaces, retrieve conference records including participant details, access recordings
  and transcripts, and end active conferences. The API supports building integrations
  that automate meeting workflows and extract meeting data.
