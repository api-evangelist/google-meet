naftiko: 1.0.0-alpha2
info:
  label: Google Meet API
  description: The Google Meet REST API enables creating and managing meeting spaces, retrieving conference records with participant
    and session details, and accessing meeting recordings and transcripts.
  tags:
  - Google
  - Meet
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: google-meet
    baseUri: https://meet.googleapis.com
    description: Google Meet API HTTP API.
    resources:
    - name: v2-spaces
      path: /v2/spaces
      operations:
      - name: createspace
        method: POST
        description: Google Meet Create meeting space
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-name
      path: /v2/{name}
      operations:
      - name: getspace
        method: GET
        description: Google Meet Get meeting space
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: 'Format: spaces/{space}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatespace
        method: PATCH
        description: Google Meet Update meeting space
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: 'Format: spaces/{space}'
        - name: updateMask
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-name-endactiveconference
      path: /v2/{name}:endActiveConference
      operations:
      - name: endactiveconference
        method: POST
        description: Google Meet End active conference
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: 'Format: spaces/{space}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-conferencerecords
      path: /v2/conferenceRecords
      operations:
      - name: listconferencerecords
        method: GET
        description: Google Meet List conference records
        inputParameters:
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
        - name: filter
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-conferencerecords-conferencerecordid
      path: /v2/conferenceRecords/{conferenceRecordId}
      operations:
      - name: getconferencerecord
        method: GET
        description: Google Meet Get conference record
        inputParameters:
        - name: conferenceRecordId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-conferencerecords-conferencerecordid-particip
      path: /v2/conferenceRecords/{conferenceRecordId}/participants
      operations:
      - name: listparticipants
        method: GET
        description: Google Meet List participants
        inputParameters:
        - name: conferenceRecordId
          in: path
          type: string
          required: true
        - name: pageSize
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-conferencerecords-conferencerecordid-particip
      path: /v2/conferenceRecords/{conferenceRecordId}/participants/{participantId}
      operations:
      - name: getparticipant
        method: GET
        description: Google Meet Get participant
        inputParameters:
        - name: conferenceRecordId
          in: path
          type: string
          required: true
        - name: participantId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-conferencerecords-conferencerecordid-recordin
      path: /v2/conferenceRecords/{conferenceRecordId}/recordings
      operations:
      - name: listrecordings
        method: GET
        description: Google Meet List recordings
        inputParameters:
        - name: conferenceRecordId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-conferencerecords-conferencerecordid-transcri
      path: /v2/conferenceRecords/{conferenceRecordId}/transcripts
      operations:
      - name: listtranscripts
        method: GET
        description: Google Meet List transcripts
        inputParameters:
        - name: conferenceRecordId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-conferencerecords-conferencerecordid-transcri
      path: /v2/conferenceRecords/{conferenceRecordId}/transcripts/{transcriptId}/entries
      operations:
      - name: listtranscriptentries
        method: GET
        description: Google Meet List transcript entries
        inputParameters:
        - name: conferenceRecordId
          in: path
          type: string
          required: true
        - name: transcriptId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
