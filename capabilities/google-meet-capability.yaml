      name: createspace
      operations:
      - method: POST
        name: createspace
        description: Google Meet Create meeting space
        call: google-meet.createspace
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/{name}
      name: getspace
      operations:
      - method: GET
        name: getspace
        description: Google Meet Get meeting space
        call: google-meet.getspace
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/{name}
      name: updatespace
      operations:
      - method: PATCH
        name: updatespace
        description: Google Meet Update meeting space
        call: google-meet.updatespace
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
